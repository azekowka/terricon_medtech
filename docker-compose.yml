services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medservice
      POSTGRES_PASSWORD: medservice
      POSTGRES_DB: medservice
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medservice"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://medservice:medservice@db:5432/medservice
      CORS_ORIGINS: "*"
      DATA_DIR: /app/data
      ENABLE_SCHEDULER: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # The browser (host) calls the backend on the published host port.
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
